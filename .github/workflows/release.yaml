name: Release

on:
  release:
    types: [published]

env:
  FLUTTER_VERSION: 3.44.4

jobs:
  android:
    name: Android App Bundle
    runs-on: ubuntu-latest
    steps:
      # Full history so the versionCode below tracks the commit count.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Write signing config
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/upload.jks
          cat > android/key.properties <<EOF
          storeFile=upload.jks
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF
      - name: Build AAB
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          flutter build appbundle --release \
            --build-name=${TAG#v} \
            --build-number=$(git rev-list --count HEAD) \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
      - name: Release notes for Play
        env:
          NOTES: ${{ github.event.release.body }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          mkdir -p distribution/whatsnew
          printf '%s' "$NOTES" | head -c 500 > distribution/whatsnew/whatsnew-en-US
          [ -s distribution/whatsnew/whatsnew-en-US ] \
            || printf 'Release %s' "$TAG" > distribution/whatsnew/whatsnew-en-US
      - uses: actions/upload-artifact@v7
        with:
          name: hulaki-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
      - name: Upload to Google Play (internal testing)
        uses: r0adkll/upload-google-play@v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: app.hulaki
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          whatsNewDirectory: distribution/whatsnew

  ios:
    name: iOS IPA
    if: vars.BUILD_IOS == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 -d \
            > ~/Library/MobileDevice/Provisioning\ Profiles/hulaki.mobileprovision
      - name: Build IPA
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          flutter build ipa --release \
            --build-name=${TAG#v} \
            --build-number=$(git rev-list --count HEAD) \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --export-options-plist=ios/ExportOptions.plist
      - uses: actions/upload-artifact@v7
        with:
          name: hulaki-release-ipa
          path: build/ios/ipa/*.ipa
